apiVersion: apps/v1
kind: Deployment
metadata:
  name: bugzilla
  namespace: bugzilla
  labels:
    app.kubernetes.io/name: bugzilla
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: bugzilla-platform
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bugzilla
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bugzilla
        app.kubernetes.io/component: web
        app.kubernetes.io/part-of: bugzilla-platform
    spec:
      serviceAccountName: bugzilla
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 33
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: bugzilla
              app.kubernetes.io/component: web
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: bugzilla
                    app.kubernetes.io/component: web
      initContainers:
        - name: volume-permissions
          image: bugzilla:v1.0.0
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -lc
            - >
              mkdir -p /var/www/html/bugzilla/data/db /var/www/html/bugzilla/data/extensions /var/log/apache2 &&
              chown -R www-data:www-data /var/www/html/bugzilla/data /var/log/apache2
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: bugzilla-data
              mountPath: /var/www/html/bugzilla/data
            - name: apache-logs
              mountPath: /var/log/apache2
      containers:
        - name: bugzilla
          image: bugzilla:v1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: bugzilla-app-config
          env:
            - name: BUGZILLA_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bugzilla-secrets
                  key: BUGZILLA_ADMIN_PASSWORD
            - name: BUGZILLA_DB_PASS
              valueFrom:
                secretKeyRef:
                  name: bugzilla-secrets
                  key: BUGZILLA_DB_PASS
          readinessProbe:
            httpGet:
              path: /index.cgi
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /index.cgi
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /index.cgi
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: bugzilla-data
              mountPath: /var/www/html/bugzilla/data
            - name: apache-logs
              mountPath: /var/log/apache2
            - name: apache-hardening
              mountPath: /etc/apache2/conf-enabled/z-k8s-hardening.conf
              subPath: z-k8s-hardening.conf
              readOnly: true
            - name: bugzilla-theme
              mountPath: /var/www/html/bugzilla/skins/custom/global.css
              subPath: global.css
              readOnly: true
      volumes:
        - name: bugzilla-data
          persistentVolumeClaim:
            claimName: bugzilla-data
        - name: apache-logs
          emptyDir: {}
        - name: apache-hardening
          configMap:
            name: bugzilla-apache-config
        - name: bugzilla-theme
          configMap:
            name: bugzilla-theme-config
